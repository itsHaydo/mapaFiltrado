<!DOCTYPE html>
<html>
<head>
    <title>Mapa de viviendas en California</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<div style="position: fixed; top: 10px; right: 10px; z-index: 1000; background-color: white; padding: 10px; border: 1px solid black;">
    <h4>Filtros</h4>
    <label for="filter-select-age">Edad media:</label>
    <select id="filter-select-age" name="age_filter">
        <option value="all">Mostrar todo</option>
        <option value="1 - 10">1.0 - 10.0</option>
        <option value="11 - 20">11.0 - 20.0</option>
        <option value="21 - 30">21.0 - 30.0</option>
        <option value="31 - 40">31.0 - 40.0</option>
        <option value="41 - 50">41.0 - 50.0</option>
        <option value="51 - 60">51.0 - 60.0</option>
    </select>
    <br>

    <label for="filter-select-bedrooms">Total de dormitorios:</label>
    <select id="filter-select-bedrooms" name="bedrooms_filter">
        <option value="all">Mostrar todo</option>
        <option value="1 - 1500">1 - 1500</option>
        <option value="1501 - 3000">1501 - 3000</option>
        <option value="3001 - 4500">3001 - 4500</option>
        <option value="4501 - 6000">4501 - 6000</option>
        <option value="6001 - 7500">6001 - 7500</option>
    </select>
    <br>

    <label for="filter-select-ocean">Proximidad al océano:</label>
    <select id="filter-select-ocean" name="ocean_filter">
        <option value="all">Mostrar todo</option>
        <option value="inland">Mostrar lejos del mar</option>
        <option value="near_bay">Mostrar cerca del bahías</option>
        <option value="very_near_bay">Mostrar muy cerca del mar</option>
        <option value="island">Mostrar en isla</option>
    </select>
    <br>
    <br>

    <button id="update-map-button">Actualizar mapa</button>
</div>

<div id="map">
    {{ mapa | safe }}
</div>

<script>
    $(document).ready(function () {
        $('#update-map-button').click(function () {
            var selectedAgeFilter = $('#filter-select-age').val();
            var selectedBedroomsFilter = $('#filter-select-bedrooms').val();
            var selectedOceanFilter = $('#filter-select-ocean').val();

            $.ajax({
                type: 'POST',
                url: '/update_map',
                data: {
                    age_filter: selectedAgeFilter,
                    bedrooms_filter: selectedBedroomsFilter,
                    ocean_filter: selectedOceanFilter
                },
                success: function (response) {
                    $('#map').html(response);
                }
            });
        });
    });
</script>
</body>
</html>
